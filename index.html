<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ashley</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f6dce5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 430px;
      height: min(92vh, 760px);
      background: #fff;
      border-radius: 28px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 12px 40px rgba(255, 105, 145, 0.18);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      background: #fff3f7;
      border-bottom: 1px solid #f1d8e0;
      flex-shrink: 0;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .header-text {
      line-height: 1.15;
    }

    .name {
      font-size: 24px;
      font-weight: 700;
      color: #ff4f7d;
    }

    .status {
      font-size: 14px;
      color: #8f8f8f;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9ca3af;
      display: inline-block;
    }

    .dot.online {
      background: #22c55e;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 18px 14px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .row {
      display: flex;
      width: 100%;
    }

    .row.user {
      justify-content: flex-end;
    }

    .row.ai {
      justify-content: flex-start;
    }

    .bubble {
      display: inline-block;
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 20px;
      font-size: 16px;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .row.user .bubble {
      background: #ff4f7d;
      color: #fff;
      border-bottom-right-radius: 6px;
    }

    .row.ai .bubble {
      background: #f8dfe8;
      color: #111;
      border-bottom-left-radius: 6px;
    }

    .typing {
      display: none;
      padding: 0 18px 8px 18px;
      font-size: 13px;
      color: #999;
      flex-shrink: 0;
      min-height: 20px;
    }

    .input-bar {
      display: flex;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid #f0e0e6;
      background: #fff;
      flex-shrink: 0;
    }

    .input-bar input {
      flex: 1;
      min-width: 0;
      height: 50px;
      border: 1px solid #ebd8df;
      border-radius: 25px;
      padding: 0 18px;
      font-size: 16px;
      outline: none;
      background: #fff;
    }

    .input-bar input:focus {
      border-color: #ff9ab2;
      box-shadow: 0 0 0 3px rgba(255, 79, 125, 0.08);
    }

    .input-bar button {
      border: none;
      background: #ff4f7d;
      color: white;
      border-radius: 25px;
      padding: 0 22px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }

    .input-bar button:hover {
      opacity: 0.92;
    }

    .input-bar button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    @media (max-width: 520px) {
      body {
        padding: 0;
      }

      .app {
        max-width: 100%;
        height: 100vh;
        border-radius: 0;
      }

      .bubble {
        max-width: 82%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <img src="ashley.png" alt="Ashley" class="avatar">
      <div class="header-text">
        <div class="name">Ashley</div>
        <div class="status">
          <span id="statusDot" class="dot"></span>
          <span id="statusText">offline</span>
        </div>
      </div>
    </div>

    <div id="chat" class="chat"></div>

    <div id="typing" class="typing">Ashley is typing...</div>

    <div class="input-bar">
      <input id="msg" type="text" placeholder="跟Ashley說點什麼..." autocomplete="off">
      <button id="sendBtn" onclick="send()">Send</button>
    </div>
  </div>

  <script>
    let isReplying = false;
    let offlineTimer = null;
    let typingDotsTimer = null;

    function detectLang(text) {
      return /[\u4e00-\u9fa5]/.test(text) ? "zh" : "en";
    }

    function setStatusOnline() {
      document.getElementById("statusText").textContent = "online";
      document.getElementById("statusDot").classList.add("online");
      resetOfflineTimer();
    }

    function setStatusOffline() {
      document.getElementById("statusText").textContent = "offline";
      document.getElementById("statusDot").classList.remove("online");
    }

    function resetOfflineTimer() {
      if (offlineTimer) clearTimeout(offlineTimer);
      offlineTimer = setTimeout(() => {
        if (!isReplying) {
          setStatusOffline();
        }
      }, 10000);
    }

    function addMessage(text, isUser = false) {
      const chat = document.getElementById("chat");
      const row = document.createElement("div");
      row.className = isUser ? "row user" : "row ai";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;

      setStatusOnline();
    }

    function startTypingAnimation(lang = "zh") {
      const typing = document.getElementById("typing");
      let step = 0;

      typing.style.display = "block";

      const baseText = lang === "zh" ? "Ashley 輸入中" : "Ashley is typing";

      typing.textContent = baseText + ".";
      if (typingDotsTimer) clearInterval(typingDotsTimer);

      typingDotsTimer = setInterval(() => {
        step = (step + 1) % 3;
        typing.textContent = baseText + ".".repeat(step + 1);
      }, 450);
    }

    function stopTypingAnimation() {
      const typing = document.getElementById("typing");
      if (typingDotsTimer) {
        clearInterval(typingDotsTimer);
        typingDotsTimer = null;
      }
      typing.style.display = "none";
    }

    function getTypingDelayByReplyLength(replyText) {
      const length = (replyText || "").trim().length;

      const base = 700;
      const perChar = 35;
      const randomExtra = Math.floor(Math.random() * 400);

      let delay = base + (length * perChar) + randomExtra;

      if (length <= 8) delay = 700 + Math.floor(Math.random() * 300);
      if (length > 8 && length <= 20) delay = 1100 + Math.floor(Math.random() * 500);
      if (length > 20 && length <= 45) delay = 1700 + Math.floor(Math.random() * 700);
      if (length > 45) delay = 2400 + Math.floor(Math.random() * 1000);

      return Math.min(delay, 5000);
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function send() {
      const input = document.getElementById("msg");
      const sendBtn = document.getElementById("sendBtn");
      const message = input.value.trim();

      if (!message || isReplying) return;

      isReplying = true;
      sendBtn.disabled = true;

      const lang = detectLang(message);

      addMessage(message, true);
      input.value = "";
      setStatusOnline();
      startTypingAnimation(lang);

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message,
            lang
          })
        });

        const data = await res.json();
        const reply = data.reply || "剛剛好像斷了一下，你再說一次？";

        const typingDelay = getTypingDelayByReplyLength(reply);
        await sleep(typingDelay);

        stopTypingAnimation();
        addMessage(reply, false);
      } catch (e) {
        await sleep(900);
        stopTypingAnimation();
        addMessage("剛剛好像斷了一下，你再說一次？", false);
      } finally {
        isReplying = false;
        sendBtn.disabled = false;
        resetOfflineTimer();
      }
    }

    document.getElementById("msg").addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        send();
      }
    });

    setStatusOffline();
  </script>
</body>
</html>
