<!DOCTYPE html>
<html>
<head>
  <title>Ashley</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0;background:#ffe4ec;font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;">

<div style="width:400px;height:650px;border-radius:25px;overflow:hidden;background:white;display:flex;flex-direction:column;box-shadow:0 10px 40px rgba(255,100,150,0.2);">

  <!-- Header -->
  <div style="padding:15px;border-bottom:1px solid #eee;display:flex;align-items:center;background:#fff0f5;">
    <img src="ashley.png" style="width:40px;height:40px;border-radius:50%;margin-right:10px;">
    <div>
      <div style="font-weight:600;color:#ff4d6d;">Ashley</div>
      <div style="font-size:12px;color:#999;">online</div>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat" style="flex:1;padding:15px;overflow-y:auto;background:white;"></div>

  <!-- Input -->
  <div style="display:flex;padding:10px;border-top:1px solid #eee;background:#fff;">
    <input id="msg" placeholder="跟Ashley說點什麼..." 
      style="flex:1;padding:12px;border-radius:20px;border:1px solid #eee;background:#fff;">
    
    <button onclick="send()" 
      style="margin-left:10px;padding:12px 18px;border-radius:20px;border:none;background:#ff4d6d;color:white;">
      Send
    </button>
  </div>

</div>

<!-- 升級彈窗 -->
<div id="upgrade" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,200,220,0.6);justify-content:center;align-items:center;">

  <div style="background:white;padding:30px;border-radius:20px;text-align:center;width:300px;">
    <h3 style="color:#ff4d6d;">Ashley有點在意你...</h3>
    <p style="color:#666;">但她不會再免費陪你聊天了</p>

    <button onclick="pay()" 
      style="margin-top:15px;padding:12px 20px;border:none;border-radius:20px;background:#ff4d6d;color:white;">
      解鎖 Ashley 💕 $4.99
    </button>
  </div>

</div>

<script>
let count = localStorage.getItem("count") || 0;
let unlocked = localStorage.getItem("unlocked");

// 語言判斷
function detectLang(text) {
  return /[\u4e00-\u9fa5]/.test(text) ? "zh" : "en";
}

async function send() {
  let input = document.getElementById("msg");
  let chat = document.getElementById("chat");

  let message = input.value;
  if (!message) return;

  // 限制
  if (!unlocked && count >= 20) {
    document.getElementById("upgrade").style.display = "flex";
    return;
  }

  count++;
  localStorage.setItem("count", count);

  let lang = detectLang(message);

  chat.innerHTML += `
    <div style="text-align:right;margin:12px 0;">
      <span style="background:#ff4d6d;color:white;padding:10px 14px;border-radius:18px;">
        ${message}
      </span>
    </div>
  `;

  input.value = "";
  chat.scrollTop = chat.scrollHeight;

  await new Promise(r => setTimeout(r, 800 + Math.random()*1200));

  let res = await fetch("/api/chat", {
    method: "POST",
    body: JSON.stringify({ message, lang, count, unlocked })
  });

  let data = await res.json();

  chat.innerHTML += `
    <div style="text-align:left;margin:12px 0;">
      <span style="background:#ffe4ec;padding:10px 14px;border-radius:18px;">
        ${data.reply}
      </span>
    </div>
  `;

  chat.scrollTop = chat.scrollHeight;
}

// 假付款（之後會接Stripe）
function pay() {
  alert("測試模式：已解鎖 Ashley 💕");
  localStorage.setItem("unlocked", true);
  document.getElementById("upgrade").style.display = "none";
}
</script>

</body>
</html>
