<!DOCTYPE html>
<html>
<head>
  <title>Ashley</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>

<body style="margin:0;background:#ffe4ec;font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;">

<div style="width:400px;height:650px;border-radius:25px;overflow:hidden;background:white;display:flex;flex-direction:column;box-shadow:0 10px 40px rgba(255,100,150,0.2);">

  <!-- Header -->
  <div style="padding:15px;border-bottom:1px solid #eee;display:flex;align-items:center;background:#fff0f5;">
    <img src="ashley.png" style="width:40px;height:40px;border-radius:50%;margin-right:10px;">
    <div>
      <div style="font-weight:600;color:#ff4d6d;">Ashley</div>
      <div style="font-size:12px;color:#999;">online</div>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat" style="flex:1;padding:15px;overflow-y:auto;background:white;"></div>

  <!-- typing -->
  <div id="typing" style="display:none;margin:10px;color:#999;font-size:14px;">
    Ashley is typing...
  </div>

  <!-- Input -->
  <div style="display:flex;padding:10px;border-top:1px solid #eee;background:#fff;">
    <input id="msg" placeholder="跟Ashley說點什麼..." 
      style="flex:1;padding:12px;border-radius:20px;border:1px solid #eee;font-size:16px;">
    
    <button onclick="send()" 
      style="margin-left:10px;padding:12px 18px;border-radius:20px;border:none;background:#ff4d6d;color:white;">
      Send
    </button>
  </div>

</div>

<script>
let lastUserTime = Date.now();

// 語言判斷
function detectLang(text) {
  return /[\u4e00-\u9fa5]/.test(text) ? "zh" : "en";
}

// 加入訊息
function addMessage(text, isUser=false){
  let chat = document.getElementById("chat");

  let html = isUser
    ? `<div style="text-align:right;margin:14px 0;">
        <span style="background:#ff4d6d;color:white;padding:10px 14px;border-radius:18px 18px 4px 18px;">
          ${text}
        </span>
      </div>`
    : `<div style="text-align:left;margin:14px 0;">
        <span style="background:#ffe4ec;padding:10px 14px;border-radius:18px 18px 18px 4px;">
          ${text}
        </span>
      </div>`;

  chat.innerHTML += html;
  chat.scrollTop = chat.scrollHeight;
}

// 發送訊息
async function send(){
  let input = document.getElementById("msg");
  let message = input.value;
  if(!message) return;

  lastUserTime = Date.now();

  addMessage(message, true);
  input.value = "";

  // typing動畫
  let typing = document.getElementById("typing");
  typing.style.display = "block";
  typing.innerHTML = "Ashley is typing.";
  setTimeout(()=>typing.innerHTML="Ashley is typing..", 500);
  setTimeout(()=>typing.innerHTML="Ashley is typing...", 1000);

  await new Promise(r => setTimeout(r, 1200 + Math.random()*1500));

  typing.style.display = "none";

  let lang = detectLang(message);

  let res = await fetch("/api/chat", {
    method:"POST",
    body: JSON.stringify({ message, lang })
  });

  let data = await res.json();

  addMessage(data.reply);
}

// 💥 Ashley 主動聊天（超重要）
setInterval(async ()=>{
  let now = Date.now();

  // 如果30秒沒講話 → 主動訊息
  if(now - lastUserTime > 30000){

    let res = await fetch("/api/chat", {
      method:"POST",
      body: JSON.stringify({
        message: "（對方沉默了一段時間，請主動開啟一個自然話題）",
        lang: "zh",
        proactive: true
      })
    });

    let data = await res.json();

    addMessage(data.reply);

    lastUserTime = Date.now(); // 重置避免連續轟炸
  }

}, 10000);

</script>

</body>
</html>
