<!DOCTYPE html>
<html>
<head>
  <title>Ashley</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0;background:#000;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:white;display:flex;justify-content:center;align-items:center;height:100vh;">

<div style="width:400px;height:650px;border-radius:25px;overflow:hidden;background:#0a0a0a;box-shadow:0 0 40px rgba(255,100,150,0.1);display:flex;flex-direction:column;">

  <!-- Header -->
  <div style="padding:18px;border-bottom:1px solid #222;display:flex;align-items:center;">
    <div style="width:10px;height:10px;background:#ff4d6d;border-radius:50%;margin-right:10px;"></div>
    <div>
      <div style="font-weight:600;">Ashley</div>
      <div style="font-size:12px;color:#888;">online</div>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat" style="flex:1;padding:15px;overflow-y:auto;"></div>

  <!-- Input -->
  <div style="display:flex;padding:10px;border-top:1px solid #222;background:#0a0a0a;">
    <input id="msg" placeholder="跟Ashley說點什麼..." 
      style="flex:1;padding:12px;border-radius:20px;border:none;background:#111;color:white;outline:none;">
    
    <button onclick="send()" 
      style="margin-left:10px;padding:12px 18px;border-radius:20px;border:none;background:#ff4d6d;color:white;">
      Send
    </button>
  </div>

</div>

<script>
async function send() {
  let input = document.getElementById("msg");
  let chat = document.getElementById("chat");

  let message = input.value;
  if (!message) return;

  // 使用者訊息（右）
  chat.innerHTML += `
    <div style="text-align:right;margin:12px 0;">
      <span style="background:#ff4d6d;color:white;padding:10px 14px;border-radius:18px;display:inline-block;max-width:70%;">
        ${message}
      </span>
    </div>
  `;

  input.value = "";
  chat.scrollTop = chat.scrollHeight;

  // 模擬打字延遲（戀愛感關鍵）
  await new Promise(r => setTimeout(r, 800 + Math.random()*1200));

  let res = await fetch("/api/chat", {
    method: "POST",
    body: JSON.stringify({ message })
  });

  let data = await res.json();

  // Ashley訊息（左）
  chat.innerHTML += `
    <div style="text-align:left;margin:12px 0;">
      <span style="background:#222;padding:10px 14px;border-radius:18px;display:inline-block;max-width:70%;">
        ${data.reply}
      </span>
    </div>
  `;

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
